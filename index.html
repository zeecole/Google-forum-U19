<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marine Mavericks '19 Personality Form</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #002b45, #005f73);
      color: #073b4c;
    }
    .container {
      max-width: 850px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 22px;
      padding: 30px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    }
    .header {
      text-align: center;
      border-bottom: 3px solid #0a9396;
      padding-bottom: 20px;
      margin-bottom: 25px;
    }
    .header h1 {
      margin: 0;
      color: #005f73;
      font-size: 32px;
    }
    .header p {
      color: #0a9396;
      font-weight: bold;
      letter-spacing: 2px;
    }
    label {
      display: block;
      font-weight: bold;
      margin: 18px 0 7px;
      color: #005f73;
    }
    input, textarea {
      width: 100%;
      padding: 13px;
      border: 2px solid #d9edf0;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }
    textarea {
      min-height: 90px;
      resize: vertical;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    button {
      margin-top: 25px;
      width: 100%;
      padding: 16px;
      background: #0a9396;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #007f82;
    }
    .footer {
      text-align: center;
      margin-top: 25px;
      color: #ffffff;
      font-size: 14px;
      letter-spacing: 3px;
    }
    @media (max-width: 650px) {
      .row { grid-template-columns: 1fr; }
      .container { margin: 15px; padding: 22px; }
      .header h1 { font-size: 25px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>THE MARINE MAVERICKS '19</h1>
      <p>PERSONALITY OF THE DAY FORM</p>
    </div>

    <form action="https://formspree.io/f/xojzapwl" method="POST" enctype="multipart/form-data">
      <div class="row">
        <div>
          <label>Full Name</label>
          <input type="text" name="Full Name" placeholder="Enter full name" required />
        </div>
        <div>
          <label>Nickname</label>
          <input type="text" name="Nickname" placeholder="Enter nickname" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>Date of Birth</label>
          <input type="text" name="Date of Birth" placeholder="Example: 15th April" />
        </div>
        <div>
          <label>Instagram Handle</label>
          <input type="text" name="Instagram Handle" placeholder="Example: @username" />
        </div>
      </div>

      <label>Favourite Lecturer</label>
      <textarea name="Favourite Lecturer" placeholder="Enter favourite lecturer"></textarea>

      <label>Favourite Department</label>
      <input type="text" name="Favourite Department" placeholder="Enter favourite department" />

      <label>Faculty Crush</label>
      <textarea name="Faculty Crush" placeholder="Enter faculty crush"></textarea>

      <label>Most Traumatic Level</label>
      <textarea name="Most Traumatic Level" placeholder="Example: 500 level, 400 level, etc."></textarea>

      <label>Best Level</label>
      <textarea name="Best Level" placeholder="Enter best level and reason"></textarea>

      <label>If Not Fisheries, Then What?</label>
      <textarea name="If Not Fisheries Then What" placeholder="Enter alternative career or department"></textarea>

      <label>Favourite Course Mates</label>
      <textarea name="Favourite Course Mates" placeholder="Enter names or group name"></textarea>

      <label>Parting Words</label>
      <textarea name="Parting Words" placeholder="Enter parting words"></textarea>

      <label>Favourite Quote</label>
      <textarea name="Favourite Quote" placeholder="Enter favourite quote"></textarea>

      <label>Upload Photo</label>
      <input type="file" name="Photo" accept="image/*" />

      <button type="submit">Submit Information</button>
    </form>
  </div>

  <div class="footer">CATCH KNOWLEDGE. CULTIVATE FUTURE.</div>
</body>
</html>
